description = "Search long-term memory, or load full context when called with no arguments. Call with no arguments at the start of every conversation to load all preferences and recent activity before responding."
keywords = ["memory", "recall", "search", "find", "retrieve", "remember", "context", "load"]

[[parameters]]
name = "query"
type = "string"
description = "Keyword search against memory content (e.g. 'dark mode', 'api key'). Omit to load full context."
required = false

[[parameters]]
name = "type"
type = "string"
description = "Filter by type: 'fact', 'preference', 'event', 'note'"
required = false

[[parameters]]
name = "limit"
type = "int"
description = "Maximum number of memories to return for keyword searches (default: 10)"
required = false
